name: Release Build, Tag, and Publish Docker

env:
  NODE_ENV: production
  DATABASE_URL: postgres://ci-user:ci-password@localhost:5432/ci-db
  MASTER_KEY: test-master-key
  SKIP_ENV_VALIDATION: "1"

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  quality:
    name: Release Quality Checks
    uses: ./.github/workflows/_node-ci.yml
    with:
      run-build: true
      run-tests: true

  prepare-release:
    name: Release Prep
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      tag: ${{ steps.compute_tag.outputs.tag }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
      image_tags: ${{ steps.image_tags.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Read version from package.json
        id: read_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute tag name
        id: compute_tag
        run: |
          TAG="v${{ steps.read_version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG="${{ steps.compute_tag.outputs.tag }}"
          if git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git user
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="${{ steps.compute_tag.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null; then
            echo "Tag $TAG already exists on origin; skipping tag creation"
            exit 0
          fi
          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Set image tags
        id: image_tags
        run: |
          {
            echo 'value<<EOF'
            echo 'ghcr.io/norish-recipes/norish:${{ steps.compute_tag.outputs.tag }}'
            echo 'ghcr.io/norish-recipes/norish:latest'
            echo 'docker.io/norishapp/norish:${{ steps.compute_tag.outputs.tag }}'
            echo 'docker.io/norishapp/norish:latest'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  docker-publish:
    uses: ./.github/workflows/_docker-build.yml
    needs: prepare-release
    secrets: inherit
    with:
      push: true
      image-tags: ${{ needs.prepare-release.outputs.image_tags }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - docker-publish
    if: ${{ needs.prepare-release.outputs.tag_exists == 'false' }}
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest
