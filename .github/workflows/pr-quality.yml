name: PR Quality Checks

env:
  NODE_ENV: production
  DATABASE_URL: postgres://ci-user:ci-password@localhost:5432/ci-db
  MASTER_KEY: QmFzZTY0RW5jb2RlZE1hc3RlcktleU1pbjMyQ2hhcnM=
  SKIP_ENV_VALIDATION: "1"
  AUTH_URL: http://localhost:3000
  CHROME_WS_ENDPOINT: ws://localhost:3000

on:
  pull_request:
    branches:
      - main
      - "rc/**"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run build
        run: pnpm run build

  dependency-cycles:
    name: Dependency Cycles
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run circular dependency gate
        run: pnpm run deps:cycles

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run tests
        run: pnpm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run lint
        run: pnpm run lint


  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Run format check
        run: pnpm run format

  i18n:
    name: Locale Keys Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain and install dependencies
        uses: ./tooling/github/setup

      - name: Check locale keys
        run: pnpm run i18n:check

